<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTAH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 150px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #ccc;
    }

    .countdown {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
    }

    @media (max-width: 600px) {
      .container { padding: 40px 20px; }
      h1 { font-size: 2.2rem; }
      .countdown { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.jpg" alt="CTAH Logo" class="logo">
    <h1>CTAH</h1>
    <h2>Şu anda yapım aşamasındayız</h2>
  <p>Tahmini çıkış süresi:</p>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    // Hedef tarih
    const targetDate = new Date("March 12, 2026 00:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if(distance <= 0) {
        countdownEl.innerHTML = "Sitemiz artık yayında!";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      countdownEl.innerHTML = `${days}g ${hours}s ${minutes}d ${seconds}sn`;
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
