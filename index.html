<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTAH</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      background: #0f0f0f;
    }

    canvas#bgCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .logo {
      width: 150px;
      margin-bottom: 30px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInUp 1s forwards 0.5s;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInUp 1s forwards 1s;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #ccc;
      opacity: 0;
      animation: fadeIn 1s forwards 1.5s;
    }

    .countdown {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      animation: fadeIn 1s forwards 2s;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .container { padding: 40px 20px; }
      h1 { font-size: 2.2rem; }
      .countdown { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="container">
    <img src="logo.jpg" alt="CTAH Logo" class="logo">
    <h1>CTAH</h1>
    <p>Şu anda yapım aşamasındayız</p>
    <div class="countdown" id="countdown"></div>
  </div>

  <script>
    // Geri sayım
    const targetDate = new Date("March 12, 2026 00:00:00").getTime();
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if(distance <= 0) {
        countdownEl.innerHTML = "Sitemiz artık yayında!";
        clearInterval(timer);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      countdownEl.innerHTML = `${days}g ${hours}s ${minutes}d ${seconds}sn`;
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();

    // Partikül efekti
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 80;

    function Particle() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 1;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.5;
      this.alpha = Math.random() * 0.5 + 0.2;
    }

    Particle.prototype.update = function() {
      this.x += this.speedX;
      this.y += this.speedY;

      if(this.x < 0) this.x = canvas.width;
      if(this.x > canvas.width) this.x = 0;
      if(this.y < 0) this.y = canvas.height;
      if(this.y > canvas.height) this.y = 0;
    }

    Particle.prototype.draw = function() {
      ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    for(let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for(let p of particles) {
        p.update();
        p.draw();
      }
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
