<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTAH</title>
<style>
:root{
  --primary:#0071e3;
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --mine-bg:#0071e3;
  --other-bg:#e0e0e0;
  --online:#25D366;
  --offline:#a0a0a0;
  --modal-bg:rgba(0,0,0,0.6);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
body{background:var(--bg);display:flex;justify-content:center;align-items:center;height:100vh;color:var(--text);overflow:hidden;}
.auth{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;z-index:100;}
.card{width:90%;max-width:350px;padding:30px;background:rgba(255,255,255,0.95);border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;}
.card img.logo{width:80px;height:80px;margin-bottom:15px;border-radius:15px;object-fit:cover;}
.card input{width:100%;margin:10px 0;padding:14px;border:none;border-radius:12px;background:#f1f1f1;color:var(--text);font-size:16px;}
.buttons{display:flex;gap:12px;margin-top:15px;}
.card button{flex:1;padding:14px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:bold;font-size:15px;cursor:pointer;transition:0.2s;}
.card button:hover{background:#005bb5;}
.container{width:95%;max-width:500px;height:95vh;background:rgba(255,255,255,0.95);border-radius:25px;display:flex;flex-direction:column;padding:20px;display:none;box-shadow:0 10px 40px rgba(0,0,0,0.1);position:relative;}
#chatHeader{font-weight:600;font-size:20px;margin-bottom:12px;text-align:left;color:var(--text);display:flex;align-items:center;gap:10px;padding:10px;}
#chatHeader img.logo{width:36px;height:36px;border-radius:8px;object-fit:cover;}
#messages{flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;padding-right:5px;}
.bubble-wrapper{display:flex;align-items:flex-end;gap:10px;position:relative;}
.bubble{max-width:70%;padding:12px 16px;border-radius:20px;font-size:15px;display:flex;flex-direction:column;word-wrap:break-word;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.mine-wrapper{flex-direction:row-reverse;}
.mine{background:var(--mine-bg);color:white;border-bottom-right-radius:6px;}
.other{background:var(--other-bg);color:var(--text);border-bottom-left-radius:6px;}
.msg-info{font-size:11px;opacity:0.7;text-align:right;margin-top:4px;}
#typing{font-size:13px;opacity:0.7;height:18px;margin-top:5px;font-style:italic;}
#msgBox{display:flex;gap:12px;margin-top:12px;}
#msgBox input{flex:1;padding:14px;border-radius:15px;border:none;background:#f1f1f1;font-size:15px;color:var(--text);}
#msgBox button{padding:14px 18px;border:none;border-radius:15px;background:var(--primary);color:white;font-weight:bold;font-size:15px;cursor:pointer;transition:0.2s;}
#msgBox button:hover{background:#005bb5;}
#usersToggle{padding:10px;border-radius:12px;background:#e0e0e0;font-weight:600;cursor:pointer;width:140px;text-align:center;margin-top:10px;}
#usersPanel{position:absolute;top:70px;right:20px;width:180px;max-height:300px;background:white;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.2);overflow:auto;display:none;flex-direction:column;gap:5px;padding:10px;z-index:150;}
.user{padding:10px;border-radius:12px;background:#f1f1f1;cursor:pointer;text-align:center;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.user:hover{background:#e0e0e0;}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--online);}
.offline-dot{width:10px;height:10px;border-radius:50%;background:var(--offline);}

/* DM MODAL */
.dmModalOverlay{
  position:fixed;
  inset:0;
  background:var(--modal-bg);
  backdrop-filter:blur(5px);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:200;
}
.dmModal{
  width:90%;
  max-width:400px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
.dmHeader{padding:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center;background:#f1f1f1;}
.dmMessages{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding:15px;}
.dmInput{display:flex;padding:10px;gap:10px;border-top:1px solid #ccc;}
.dmInput input{flex:1;padding:10px;border-radius:12px;border:1px solid #ccc;}
.dmInput button{padding:10px 14px;border:none;border-radius:12px;background:var(--primary);color:white;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<div id="authScreen" class="auth">
  <div class="card">
    <img src="logo.jpg" alt="CTAH Logo" class="logo">
    <h2>CTAH</h2>
    <input id="name" placeholder="Kullanıcı adı">
    <input id="pass" type="password" placeholder="Şifre">
    <div class="buttons">
      <button id="registerBtn">Kayıt Ol</button>
      <button id="loginBtn">Giriş Yap</button>
    </div>
  </div>
</div>

<div class="container" id="chatScreen">
  <div id="chatHeader">
    <img src="logo.jpg" alt="CTAH Logo" class="logo"> CTAH
  </div>
  <div id="messages"></div>
  <div id="typing"></div>
  <div id="msgBox">
    <input id="msg" placeholder="Mesaj yaz...">
    <button id="sendBtn">Gönder</button>
  </div>
  <div id="usersToggle">Kişi Listesi</div>
  <div id="usersPanel"></div>
</div>

<div id="dmOverlay" class="dmModalOverlay">
  <div class="dmModal">
    <div class="dmHeader"><span id="dmTitle"></span><button id="dmCloseBtn">X</button></div>
    <div class="dmMessages"></div>
    <div class="dmInput">
      <input placeholder="Mesaj yaz...">
      <button id="dmSendBtn">Gönder</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, get, onChildAdded, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCinUnNEzrlAnhbV4p8m55T62oI6V38LM4",
  authDomain: "ctah-86240.firebaseapp.com",
  databaseURL: "https://ctah-86240-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ctah-86240",
  storageBucket: "ctah-86240.firebasestorage.app",
  messagingSenderId: "912157147748",
  appId: "1:912157147748:web:746f4e0a128322bacf5571"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentDMUser = null;
let dmListeners = {};

// REGISTER & LOGIN
document.getElementById("registerBtn").onclick = async () => {
  const n = document.getElementById("name").value.trim();
  const p = document.getElementById("pass").value.trim();
  if(!n||!p) return alert("İsim ve şifre gerekli!");
  const userRef = ref(db,"users/"+n);
  const snap = await get(userRef);
  if(snap.exists()) return alert("Bu isim kullanılıyor!");
  await set(userRef, { name:n, pass:p, online:true });
  currentUser = n;
  afterLogin();
}
document.getElementById("loginBtn").onclick = async () => {
  const n = document.getElementById("name").value.trim();
  const p = document.getElementById("pass").value.trim();
  if(!n||!p) return alert("İsim ve şifre gerekli!");
  const userRef = ref(db,"users/"+n);
  const snap = await get(userRef);
  if(!snap.exists()) return alert("Kullanıcı yok!");
  if(snap.val().pass !== p) return alert("Şifre yanlış!");
  currentUser = n;
  await set(ref(db,"users/"+n+"/online"),true);
  afterLogin();
}
function afterLogin(){
  document.getElementById("authScreen").style.display="none";
  document.getElementById("chatScreen").style.display="flex";
  onDisconnect(ref(db,"users/"+currentUser+"/online")).set(false);
  loadUsers();
  listenGlobalMessages();
}

// GLOBAL CHAT
const messagesDiv = document.getElementById("messages");
function listenGlobalMessages(){
  const chatRef = ref(db,"chats/global/messages");
  onChildAdded(chatRef,(data)=>{
    const m = data.val();
    const div = document.createElement("div");
    div.className="bubble-wrapper "+(m.sender===currentUser?"mine-wrapper":"");
    const bubble = document.createElement("div");
    bubble.className="bubble "+(m.sender===currentUser?"mine":"other");
    bubble.innerHTML=`<strong>${m.sender}</strong>: ${m.text}<div class="msg-info">${new Date(m.time).toLocaleTimeString().slice(0,5)}</div>`;
    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
document.getElementById("sendBtn").onclick = () => {
  const text = document.getElementById("msg").value.trim();
  if(!text) return;
  push(ref(db,"chats/global/messages"),{
    sender:currentUser,
    text:text,
    time:Date.now()
  });
  document.getElementById("msg").value="";
}

// USERS PANEL TOGGLE
const usersToggle = document.getElementById("usersToggle");
const usersPanel = document.getElementById("usersPanel");
usersToggle.onclick = () => {
  usersPanel.style.display = usersPanel.style.display==="flex"?"none":"flex";
}

// LOAD USERS
function loadUsers(){
  onValue(ref(db,"users"),snap=>{
    usersPanel.innerHTML="";
    snap.forEach(child=>{
      const u = child.val();
      if(u.name===currentUser) return;
      const div = document.createElement("div");
      div.className="user";
      div.innerHTML=`<span>${u.name}</span><span class="${u.online?"online-dot":"offline-dot"}"></span>`;
      div.onclick = ()=>openDM(u.name);
      usersPanel.appendChild(div);
    });
  });
}

// DM MODAL
const dmOverlay = document.getElementById("dmOverlay");
const dmTitle = document.getElementById("dmTitle");
const dmMessages = dmOverlay.querySelector(".dmMessages");
const dmInput = dmOverlay.querySelector(".dmInput input");
const dmSendBtn = document.getElementById("dmSendBtn");
const dmCloseBtn = document.getElementById("dmCloseBtn");

function openDM(user){
  if(currentDMUser && dmListeners[currentDMUser]){
    dmListeners[currentDMUser](); // unsubscribe
  }
  currentDMUser = user;
  dmOverlay.style.display = "flex";
  dmTitle.innerText = user;
  dmMessages.innerHTML="";
  listenDMMessages(user);
}

function closeDM(){
  if(currentDMUser && dmListeners[currentDMUser]){
    dmListeners[currentDMUser](); // listener kaldır
  }
  dmOverlay.style.display = "none";
  currentDMUser = null;
  dmMessages.innerHTML="";
}

function listenDMMessages(user){
  const chatKey = "dm_"+[currentUser,user].sort().join("_");
  const chatRef = ref(db,"chats/"+chatKey+"/messages");

  get(chatRef).then(snapshot=>{
    if(snapshot.exists()){
      snapshot.forEach(data=>{
        appendDMBubble(data.val());
      });
      dmMessages.scrollTop = dmMessages.scrollHeight;
    }
  });

  const unsubscribe = onChildAdded(chatRef,data=>{
    appendDMBubble(data.val());
    dmMessages.scrollTop = dmMessages.scrollHeight;
  });

  dmListeners[user] = unsubscribe;
}

function appendDMBubble(m){
  const div = document.createElement("div");
  div.className="bubble-wrapper "+(m.sender===currentUser?"mine-wrapper":"");
  const bubble = document.createElement("div");
  bubble.className="bubble "+(m.sender===currentUser?"mine":"other");
  bubble.innerHTML=`<strong>${m.sender}</strong>: ${m.text}<div class="msg-info">${new Date(m.time).toLocaleTimeString().slice(0,5)}</div>`;
  div.appendChild(bubble);
  dmMessages.appendChild(div);
}

dmCloseBtn.onclick = closeDM;
dmSendBtn.onclick = () => {
  if(!currentDMUser) return;
  const text = dmInput.value.trim();
  if(!text) return;
  const chatKey = "dm_"+[currentUser,currentDMUser].sort().join("_");
  push(ref(db,"chats/"+chatKey+"/messages"),{
    sender:currentUser,
    text:text,
    time:Date.now()
  });
  dmInput.value="";
}
</script>
</body>
</html>
